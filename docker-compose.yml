services:
  quine-roc:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${QUINE_HOST_PORT:-8080}:8080"
    volumes:
      - ./test-data:/test-data:ro
      - quine-data:/data
    environment:
      - QUINE_DATA_DIR=/data
    command: ["--shards", "4", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  e2e-test:
    image: curlimages/curl:latest
    depends_on:
      quine-roc:
        condition: service_healthy
    volumes:
      - ./tests/e2e:/tests:ro
    entrypoint: ["sh", "/tests/run.sh"]

volumes:
  quine-data:
